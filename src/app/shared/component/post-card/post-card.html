

{{postobj|json}}
<mat-card class="h-100">
    <mat-card-header>
        <mat-card-title>
            {{postobj.title}}
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <p class="m-0">
            {{postobj.body}}        </p>
    </mat-card-content>

    <mat-card-actions>
        <button matButton class="w-100">View More</button>
    </mat-card-actions>
</mat-card>
